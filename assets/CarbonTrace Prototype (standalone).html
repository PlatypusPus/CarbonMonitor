document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

rder:none;border-radius:9px;padding:9px 18px;font-size:14px;font-weight:600;background:{{ tabCsvBg }};color:{{ tabCsvColor }};box-shadow:{{ tabCsvShadow }};\">CSV upload<\u002Fbutton>\n            <button onclick=\"{{ setModeOcr }}\" style=\"border:none;border-radius:9px;padding:9px 18px;font-size:14px;font-weight:600;background:{{ tabOcrBg }};color:{{ tabOcrColor }};box-shadow:{{ tabOcrShadow }};\">Bill scan<\u002Fbutton>\n          <\u002Fdiv>\n\n          <div style=\"background:#fff;border:1px solid #EBEFEC;border-radius:16px;padding:24px;\">\n            <!-- MANUAL -->\n            <sc-if value=\"{{ isManual }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"display:flex;gap:16px;align-items:flex-end;max-width:560px;\">\n                <div style=\"flex:1;\">\n                  <label style=\"display:block;font-size:13px;font-weight:600;color:#3A4A41;margin-bottom:7px;\">Quantity consumed<\u002Flabel>\n                  <input type=\"number\" value=\"{{ entryQty }}\" oninput=\"{{ setEntryQty }}\" placeholder=\"0\" style=\"width:100%;border:1px solid #DCE3DF;border-radius:10px;padding:13px 14px;font-size:18px;font-family:'Roboto Mono',monospace;background:#fff;outline:none;\" style-focus=\"border-color:#2E9E6B;\">\n                <\u002Fdiv>\n                <div style=\"border:1px solid #E6ECE8;border-radius:10px;padding:13px 16px;background:#F7FAF8;font-size:15px;font-weight:600;color:#52635A;\">{{ entryUnit }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:20px;margin-top:22px;padding-top:20px;border-top:1px dashed #E2E8E4;\">\n                <div style=\"flex:1;\">\n                  <div style=\"font-size:12.5px;color:#8A968F;margin-bottom:4px;\">Calculated emissions <span style=\"font-family:'Roboto Mono',monospace;\">({{ entryQtyDisplay }} {{ entryUnit }} × {{ entryFactor }})<\u002Fspan><\u002Fdiv>\n                  <div style=\"display:flex;align-items:baseline;gap:8px;\"><span style=\"font-family:'Roboto Mono',monospace;font-size:28px;font-weight:500;color:{{ entryScopeColor }};\">{{ entryCalc }}<\u002Fspan><span style=\"font-size:14px;color:#8A968F;\">kgCO₂e<\u002Fspan><span style=\"font-family:'Roboto Mono',monospace;font-size:10px;letter-spacing:.5px;color:{{ entryScopeColor }};background:{{ entryScopeBg }};border-radius:6px;padding:3px 8px;margin-left:4px;\">{{ entryScopeLabel }}<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n                <button onclick=\"{{ saveManual }}\" style=\"display:flex;align-items:center;gap:8px;background:#2E9E6B;border:none;color:#fff;font-size:14.5px;font-weight:600;padding:12px 22px;border-radius:11px;box-shadow:0 8px 18px rgba(46,158,107,.26);\" style-hover=\"background:#268057;\">Save entry<\u002Fbutton>\n              <\u002Fdiv>\n              <sc-if value=\"{{ entrySaved }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"display:flex;align-items:center;gap:9px;margin-top:16px;background:#E8F3EC;border:1px solid #BFE0CC;border-radius:11px;padding:11px 15px;color:#2E7D57;font-size:14px;font-weight:600;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 12.5 L9.5 18 L20 6.5\"><\u002Fpath><\u002Fsvg>Entry saved to {{ entryFacName }} · {{ entryPeriodLabel }}.<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fsc-if>\n\n            <!-- CSV -->\n            <sc-if value=\"{{ isCsv }}\" hint-placeholder-val=\"{{ false }}\">\n              <sc-if value=\"{{ csvNotDone }}\" hint-placeholder-val=\"{{ true }}\">\n                <div onclick=\"{{ uploadCsv }}\" style=\"border:2px dashed #CFE0D6;border-radius:14px;padding:46px;text-align:center;background:#F9FBFA;cursor:pointer;\" style-hover=\"border-color:#2E9E6B;background:#F2F9F5;\">\n                  <div style=\"width:54px;height:54px;border-radius:14px;background:#E8F3EC;display:flex;al crUploadStage }}\" hint-placeholder-val=\"{{ true }}\">\n                <div onclick=\"{{ scanBill }}\" style=\"border:2px dashed #CFE0D6;border-radius:14px;padding:46px;text-align:center;background:#F9FBFA;cursor:pointer;\" style-hover=\"border-color:#2E9E6B;background:#F2F9F5;\">\n                  <div style=\"width:54px;height:54px;border-radius:14px;background:#E8F3EC;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;color:#2E9E6B;\"><svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 7 V5 a2 2 0 0 1 2-2 h2\"><\u002Fpath><path d=\"M17 3 h2 a2 2 0 0 1 2 2 v2\"><\u002Fpath><path d=\"M21 17 v2 a2 2 0 0 1-2 2 h-2\"><\u002Fpath><path d=\"M7 21 H5 a2 2 0 0 1-2-2 v-2\"><\u002Fpath><path d=\"M7 12 h10\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n                  <div style=\"font-size:16px;font-weight:600;margin-bottom:5px;\">Upload a utility bill to scan<\u002Fdiv>\n                  <div style=\"font-size:13.5px;color:#8A968F;\">PDF or photo of a MESCOM electricity / fuel invoice<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ ocrExtractStage }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"display:grid;grid-template-columns:200px 1fr;gap:24px;align-items:start;\">\n                  <div style=\"border:1px solid #E6ECE8;border-radius:12px;overflow:hidden;background:#F7FAF8;\">\n                    <div style=\"background:#1C2B22;color:#fff;padding:9px 12px;font-family:'Roboto Mono',monospace;font-size:10px;letter-spacing:.5px;display:flex;align-items:center;gap:6px;\"><span style=\"width:7px;height:7px;border-radius:50%;background:#56B98A;\"><\u002Fspan>SCANNED BILL<\u002Fdiv>\n                    <div style=\"padding:14px;line-height:1.7;font-size:10px;color:#9AA59E;font-family:'Roboto Mono',monospace;\">\n                      <div style=\"font-weight:600;color:#52635A;\">MESCOM<\u002Fdiv>\n                      <div>Acc 4471-220-118<\u002Fdiv>\n                      <div style=\"margin-top:8px;color:#C7CFC9;\">Units billed<\u002Fdiv>\n                      <div style=\"font-size:15px;color:#1C2B22;background:#FCEFD9;border:1px dashed #E0B877;border-radius:5px;padding:3px 5px;display:inline-block;margin-top:2px;\">1860 kWh<\u002Fdiv>\n                      <div style=\"margin-top:8px;color:#C7CFC9;\">Billing period<\u002Fdiv>\n                      <div style=\"color:#52635A;\">01–31 May 2026<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <div>\n                    <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:16px;background:#FCF4E6;border:1px solid #EED9B4;border-radius:11px;padding:11px 14px;color:#9A6A1E;font-size:13.5px;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none;\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 8 v4\"><\u002Fpath><path d=\"M12 16 h.01\"><\u002Fpath><\u002Fsvg>Extracted by OCR — <strong style=\"margin-left:3px;\">verify the value before it is saved.<\u002Fstrong><\u002Fdiv>\n                    <label style=\"display:block;font-size:13px;font-weight:600;color:#3A4A41;margin-bottom:7px;\">Extracted quantity (editable)<\u002Flabel>\n                    <div style=\"display:flex;gap:12px;align-items:center;max-width:420px;\">\n                      <input type=\"number\" value=\"{{ ocrValue }}\" oninput=\"{{ setOcrValue }}\" style=\"flex:1;border:1px solid #DCE3DF;border-radius:10px;padding:13px 14px;font-size:18px;font-family:'Roboto Mono',monospace;background:#fff;outline:none;\" style-focus=\"border-color:#2E9E6B;\">\n                      <span style=\"font-size:15px;font-weight:600;color:#52635A;\">kWh<\u002Fspan>\n                    <\u002Fdiv>\n       <div><div style=\"font-size:16px;font-weight:700;color:#1F6B47;\">Confirmed &amp; saved<\u002Fdiv><div style=\"font-size:13.5px;color:#3E7D5C;margin-top:2px;\"><span style=\"font-family:'Roboto Mono',monospace;\">{{ ocrValue }} kWh<\u002Fspan> · {{ ocrCalc }} kgCO₂e logged as human-verified Scope 2.<\u002Fdiv><\u002Fdiv>\n                  <div style=\"flex:1;\"><\u002Fdiv>\n                  <button onclick=\"{{ resetOcr }}\" style=\"background:#fff;border:1px solid #BFE0CC;color:#2E7D57;font-size:14px;font-weight:600;padding:10px 16px;border-radius:10px;\">Scan another<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ============ TRENDS ============ -->\n        <sc-if value=\"{{ isTrends }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:6px;\">\n            <div>\n              <h1 style=\"font-size:28px;font-weight:700;letter-spacing:-.8px;margin:0;\">Emission trends<\u002Fh1>\n              <p style=\"font-size:15px;color:#5A6B61;margin:6px 0 0;\">Scope 1 and Scope 2 plotted as separate series — never combined into one line.<\u002Fp>\n            <\u002Fdiv>\n            <select value=\"{{ trendFac }}\" onchange=\"{{ setTrendFac }}\" style=\"border:1px solid #DCE3DF;border-radius:10px;padding:10px 32px 10px 13px;font-size:14px;font-weight:600;background:#fff;outline:none;appearance:none;-webkit-appearance:none;cursor:pointer;\" style-focus=\"border-color:#2E9E6B;\">\n              <option value=\"all\">All facilities<\u002Foption>\n              <sc-for list=\"{{ facilityOptions }}\" as=\"f\" hint-placeholder-count=\"5\"><option value=\"{{ f.id }}\">{{ f.name }}<\u002Foption><\u002Fsc-for>\n            <\u002Fselect>\n          <\u002Fdiv>\n\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:18px;\">\n            <!-- Scope 1 chart -->\n            <div style=\"background:#fff;border:1px solid #EBEFEC;border-radius:16px;padding:20px 22px;\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;\">\n                <div style=\"display:flex;align-items:center;gap:8px;\"><span style=\"width:10px;height:10px;border-radius:3px;background:#C2772E;\"><\u002Fspan><span style=\"font-size:14px;font-weight:700;color:#1C2B22;\">Scope 1 — direct<\u002Fspan><\u002Fdiv>\n                <span style=\"font-size:11.5px;color:#A8B2AB;\">tCO₂e / month<\u002Fspan>\n              <\u002Fdiv>\n              <svg viewBox=\"0 0 360 240\" style=\"width:100%;height:auto;display:block;\">\n                <sc-for list=\"{{ chart.s1.gridY }}\" as=\"g\" hint-placeholder-count=\"3\">\n                  <line x1=\"40\" y1=\"{{ g.y }}\" x2=\"348\" y2=\"{{ g.y }}\" stroke=\"#F2F0EC\" stroke-width=\"1\"><\u002Fline>\n                  <text x=\"33\" y=\"{{ g.ty }}\" text-anchor=\"end\" font-family=\"Roboto Mono, monospace\" font-size=\"9.5\" fill=\"#B59B82\">{{ g.label }}<\u002Ftext>\n                <\u002Fsc-for>\n                <polyline points=\"{{ chart.s1.area }}\" fill=\"#FBF1E7\" stroke=\"none\"><\u002Fpolyline>\n                <polyline points=\"{{ chart.s1.line }}\" fill=\"none\" stroke=\"#C2772E\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline>\n                <sc-for list=\"{{ chart.s1.dots }}\" as=\"d\" hint-placeholder-count=\"6\"><circle cx=\"{{ d.x }}\" cy=\"{{ d.y }}\" r=\"3.5\" fill=\"#fff\" stroke=\"#C2772E\" stroke-width=\"2\"><\u002Fcircle><\u002Fsc-for>\n                <sc-for list=\"{{ chart.xLabels }}\" as=\"x\" hint-placeholder-count=\"6\"><text x=\"{{ x.x }}\" y=\"232\" text-anchor=\"middle\" font-family=\"Roboto Mono, monospace\" font-size=\"10\" fill=\"#8A968F\">{{ x.label }}<\u002Ftext><\u002Fsc-for>\n              <\u002Fsvg>\n            <\u002Fdiv>\n            <!-- Scope 2 chart -->\n            <div style=\"background:#fff;border:1px solid #EBEFEC;border-radius:16px;padding:20px 22px;\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;\">\n                <div style=\"display:flex;align-items:center;gap:8px;\"><span style=\"width:10px;height:10px;border-radius:3px;background:#3E6E96;\"><\u002Fspan><span style=\"font-size:14px;font-weight:700;color:#1C2B22;\">Scope 2 — electricity<\u002Fspan><\u002Fdiv>\n                <span style=\"font-size:11.5px;color:#A8B2AB;\">tCO₂e / month<\u002Fspan>\n              <\u002Fdiv>\n              <svg viewBox=\"0 0 360 240\" style=\"width:100%;height:auto;display:block;\">\n                <sc-for list=\"{{ chart.s2.gridY }}\" as=\"g\" hint-placeholder-count=\"3\">\n                  <line x1=\"40\" y1=\"{{ g.y }}\" x2=\"348\" y2=\"{{ g.y }}\" stroke=\"#EEF1F4\" stroke-width=\"1\"><\u002Fline>\n                  <text x=\"33\" y=\"{{ g.ty }}\" text-anchor=\"end\" font-family=\"Roboto Mono, monospace\" font-size=\"9.5\" fill=\"#8FA3B5\">{{ g.label }}<\u002Ftext>\n                <\u002Fsc-for>\n                <polyline points=\"{{ chart.s2.area }}\" fill=\"#EDF2F6\" stroke=\"none\"><\u002Fpolyline>\n                <polyline points=\"{{ chart.s2.line }}\" fill=\"none\" stroke=\"#3E6E96\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpolyline>\n                <sc-for list=\"{{ chart.s2.dots }}\" as=\"d\" hint-placeholder-count=\"6\"><circle cx=\"{{ d.x }}\" cy=\"{{ d.y }}\" r=\"3.5\" fill=\"#fff\" stroke=\"#3E6E96\" stroke-width=\"2\"><\u002Fcircle><\u002Fsc-for>\n                <sc-for list=\"{{ chart.xLabels }}\" as=\"x\" hint-placeholder-count=\"6\"><text x=\"{{ x.x }}\" y=\"232\" text-anchor=\"middle\" font-family=\"Roboto Mono, monospace\" font-size=\"10\" fill=\"#8A968F\">{{ x.label }}<\u002Ftext><\u002Fsc-for>\n              <\u002Fsvg>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px;\">\n            <div style=\"background:#fff;border:1px solid #EBEFEC;border-radius:14px;padding:18px 20px;border-left:3px solid #C2772E;\">\n              <div style=\"font-family:'Roboto Mono',monospace;font-size:10.5px;letter-spacing:.5px;color:#B5651F;margin-bottom:8px;\">SCOPE 1 — LATEST vs FIRST<\u002Fdiv>\n              <div style=\"font-size:14px;color:#3A4A41;line-height:1.5;\">{{ trendSummary.s1 }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#fff;border:1px solid #EBEFEC;border-radius:14px;padding:18px 20px;border-left:3px solid #3E6E96;\">\n              <div style=\"font-family:'Roboto Mono',monospace;font-size:10.5px;letter-spacing:.5px;color:#34648A;margin-bottom:8px;\">SCOPE 2 — LATEST vs FIRST<\u002Fdiv>\n              <div style=\"font-size:14px;color:#3A4A41;line-height:1.5;\">{{ trendSummary.s2 }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ============ ANOMALIES ============ -->\n        <sc-if value=\"{{ isAnomalies }}\" hint-placeholder-val=\"{{ false }}\">\n          <h1 style=\"font-size:28px;font-weight:700;letter-spacing:-.8px;margin:0;\">Anomalies<\u002Fh1>\n          <p style=\"font-size:15px;color:#5A6B61;margin:6px 0 8px;\">Flagged where a period's value is well above its own recent baseline. Confidence depends on how much history exists.<\u002Fp>\n          <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:22px;background:#F7FAF8;border:1px solid #E6ECE8;border-radius:10px;padding:9px 13px;width:fit-content;\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#8A968F\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 8 v4\"><\u002Fpath><path d=\"M12 16 h.01\"><\u002Fpath><\u002Fsvg><span style=\"font-size:13px;color:#5A6B61;\">Detection compares each value to the mean of prior months for that facility &amp; activity.<\u002Fspan><\u002Fdiv>\n\n          <div style=\"display:flex;flex-direction:column;gap:14px;\">\n            <sc-for list=\"{{ anomalies }}\" as=\"a\" hint-placeholder-count=\"2\">\n              <div style=\"background:#fff;border:1px solid #E6ECE8;border-radius:12px;padding:18px 20px;\">\n                <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:16px;\">\n                  <div style=\"flex:1;\">\n                    <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:8px;\">\n                      <span style=\"width:9px;height:9px;border-radius:2px;background:{{ a.scopeColor }};\"><\u002Fspan>\n                      <span style=\"font-size:16px;font-weight:600;letter-spacing:-.2px;\">{{ a.facName }}<\u002Fspan>\n                      <span style=\"font-size:12.5px;color:#8A968F;\">{{ a.scopeLabel }} · {{ a.typeLabel }}<\u002Fspan>\n                    <\u002Fdiv>\n                    <div style=\"font-size:14.5px;color:#3A4A41;line-height:1.55;\">{{ a.period }} {{ a.typeLabel }} was <strong>{{ a.cur }} {{ a.unit }}<\u002Fstrong> — <strong style=\"color:#B5651F;\">{{ a.pct }}% above<\u002Fstrong> the {{ a.months }}-month average of {{ a.avg }} {{ a.unit }}.<\u002Fdiv>\n                    <div style=\"display:flex;align-items:center;gap:8px;margin-top:12px;\">\n                      <span style=\"display:flex;align-items:center;gap:6px;font-family:'Roboto Mono',monospace;font-size:11px;color:{{ a.confColor }};background:{{ a.confBg }};border:1px solid {{ a.confBorder }};border-radius:8px;padding:4px 9px;\"><span style=\"width:7px;height:7px;border-radius:50%;background:{{ a.confDot }};\"><\u002Fspan>{{ a.confLabel }} CONFIDENCE<\u002Fspan>\n                      <span style=\"font-size:12.5px;color:#8A968F;font-style:italic;\">based on {{ a.months }} months of data<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"text-align:right;flex:none;\">\n                    <div style=\"font-family:'Roboto Mono',monospace;font-size:22px;font-weight:500;color:#B5651F;letter-spacing:-.5px;\">+{{ a.pct }}%<\u002Fdiv>\n                    <div style=\"font-size:12px;color:#8A968F;margin-top:2px;\">vs baseline<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ============ RECOMMENDATIONS ============ -->\n        <sc-if value=\"{{ isRecs }}\" hint-placeholder-val=\"{{ false }}\">\n          <h1 style=\"font-size:28px;font-weight:700;letter-spacing:-.8px;margin:0;\">Recommendations<\u002Fh1>\n          <p style=\"font-size:15px;color:#5A6B61;margin:6px 0 22px;\">Rule-based suggestions. Each shows the actual figure that triggered it, so the reasoning is auditable.<\u002Fp>\n\n          <div style=\"display:flex;flex-direction:column;gap:14px;\">\n            <sc-for list=\"{{ recs }}\" as=\"r\" hint-placeholder-count=\"4\">\n              <div style=\"background:#fff;border:1px solid #E6ECE8;border-radius:12px;padding:18px 20px;display:flex;gap:18px;\">\n                <span style=\"width:40px;height:40px;border-radius:11px;background:#E8F3EC;display:flex;align-items:center;justify-content:center;color:#2E9E6B;flex:none;\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M9 18 h6\"><\u002Fpath><path d=\"M10 21 h4\"><\u002Fpath><path d=\"M12 2 a7 7 0 0 0-4 12.7 c.6.5 1 1.3 1 2.3 h6 c0-1 .4-1.8 1-2.3 A7 7 0 0 0 12 2 Z\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n                <div style=\"flex:1;\">\n                  <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:8px;\">\n                    <span style=\"font-size:16.5px;font-weight:700;letter-spacing:-.3px;\">{{ r.title }}<\u002Fspan>\n                    <span style=\"font-family:'Roboto Mono',monospace;font-size:10px;letter-spacing:.5px;color:{{ r.tagColor }};background:{{ r.tagBg }};border-radius:6px;padding:3px 8px;\">{{ r.tag }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"display:inline-flex;align-items:center;gap:8px;background:#F7FAF8;border:1px solid #E6ECE8;border-radius:9px;padding:7px 12px;margin-bottom:11px;\">\n                    <span style=\"font-family:'Roboto Mono',monospace;font-size:9.5px;letter-spacing:.5px;color:#8A968F;\">TRIGGER<\u002Fspan>\n                    <span style=\"font-family:'Roboto Mono',monospace;font-size:13px;color:#1C2B22;font-weight:500;\">{{ r.trigger }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"font-size:14.5px;color:#3A4A41;line-height:1.55;\">{{ r.body }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ============ SCENARIO SIMULATOR ============ -->\n        <sc-if value=\"{{ isScenario }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:sticky;top:-30px;z-index:5;margin:-30px -34px 22px;background:repeating-linear-gradient(135deg,#7A4A12,#7A4A12 12px,#86581E 12px,#86581E 24px);padding:11px 34px;display:flex;align-items:center;gap:10px;\">\n            <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FBE6C5\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 9 v4\"><\u002Fpath><path d=\"M12 17 h.01\"><\u002Fpath><path d=\"M10.3 3.3 L1.8 18 a2 2 0 0 0 1.7 3 h17 a2 2 0 0 0 1.7-3 L13.7 3.3 a2 2 0 0 0-3.4 0 Z\"><\u002Fpath><\u002Fsvg>\n            <span style=\"font-family:'Roboto Mono',monospace;font-size:12px;letter-spacing:1px;color:#FBE6C5;font-weight:500;\">HYPOTHETICAL — NOT SAVED AS REAL REPORTING DATA<\u002Fspan>\n          <\u002Fdiv>\n\n          <h1 style=\"font-size:28px;font-weight:700;letter-spacing:-.8px;margin:0;\">Scenario simulator<\u002Fh1>\n          <p style=\"font-size:15px;color:#5A6B61;margin:6px 0 22px;\">Start from a real past period, change the inputs, and see the impact. Results here never affect your reported figures.<\u002Fp>\n\n          <div style=\"display:flex;gap:14px;margin-bottom:20px;\">\n            <div style=\"flex:1;\">\n              <label style=\"display:block;font-size:13px;font-weight:600;color:#3A4A41;margin-bottom:7px;\">Baseline facility<\u002Flabel>\n              <select value=\"{{ sFac }}\" onchange=\"{{ setSFac }}\" style=\"width:100%;border:1px solid #D8C9A8;border-radius:10px;padding:11px 32px 11px 13px;font-size:14.5px;background:#FFFDF8;outline:none;appearance:none;-webkit-appearance:none;cursor:pointer;\" style-focus=\"border-color:#B5651F;\">\n                <sc-for list=\"{{ facilityOptions }}\" as=\"f\" hint-placeholder-count=\"5\"><option value=\"{{ f.id }}\">{{ f.name }}<\u002Foption><\u002Fsc-for>\n              <\u002Fselect>\n            <\u002Fdiv>\n            <div style=\"flex:1;\">\n              <label style=\"display:block;font-size:13px;font-weight:600;color:#3A4A41;margin-bottom:7px;\">Baseline period<\u002Flabel>\n              <select value=\"{{ sPeriod }}\" onchange=\"{{ setSPeriod }}\" style=\"width:100%;border:1px solid #D8C9A8;border-radius:10px;padding:11px 32px 11px 13px;font-size:14.5px;background:#FFFDF8;outline:none;appearance:none;-webkit-appearance:none;cursor:pointer;\" style-focus=\"border-color:#B5651F;\">\n                <sc-for list=\"{{ sPeriodOptions }}\" as=\"p\" hint-placeholder-count=\"6\"><option value=\"{{ p.idx }}\">{{ p.label }}<\u002Foption><\u002Fsc-for>\n              <\u002Fselect>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:grid;grid-template-columns:1fr 1.15fr;gap:18px;align-items:start;\">\n            <!-- inputs -->\n            <div style=\"background:#FFFDF8;border:1px solid #E7D9BC;border-radius:16px;padding:22px;\">\n              <div style=\"font-family:'Roboto Mono',monospace;font-size:10.5px;letter-spacing:1px;color:#9A6A1E;margin-bottom:16px;\">EDITABLE INPUTS — {{ sFacName }}, {{ sPeriodLabel }}<\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:14px;\">\n                <sc-for list=\"{{ sInputRows }}\" as=\"i\" hint-placeholder-count=\"3\">\n                  <div>\n                    <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;\"><label style=\"font-size:13.5px;font-weight:600;color:#3A4A41;display:flex;align-items:center;gap:7px;\"><span style=\"width:9px;height:9px;border-radius:2px;background:{{ i.scopeColor }};\"><\u002Fspan>{{ i.label }}<\u002Flabel><span style=\"font-size:11.5px;color:#8A968F;\">baseline {{ i.baseline }} {{ i.unit }}<\u002Fspan><\u002Fdiv>\n                    <div style=\"display:flex;gap:9px;align-items:center;\"><input type=\"number\" value=\"{{ i.value }}\" oninput=\"{{ i.onChange }}\" style=\"flex:1;border:1px solid #D8C9A8;border-radius:9px;padding:11px 13px;font-size:15px;font-family:'Roboto Mono',monospace;background:#fff;outline:none;\" style-focus=\"border-color:#B5651F;\"><span style=\"font-size:13px;color:#8A968F;width:34px;\">{{ i.unit }}<\u002Fspan><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <button onclick=\"{{ recalc }}\" style=\"display:flex;align-items:center;gap:8px;width:100%;justify-content:center;background:#8A581E;border:none;color:#fff;font-size:14.5px;font-weight:600;padding:13px;border-radius:11px;margin-top:20px;box-shadow:0 8px 18px rgba(138,88,30,.24);\" style-hover=\"background:#76491A;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 12 a9 9 0 1 1-3-6.7\"><\u002Fpath><path d=\"M21 4 v5 h-5\"><\u002Fpath><\u002Fsvg>Recalculate<\u002Fbutton>\n            <\u002Fdiv>\n\n            <!-- results -->\n            <div style=\"background:#fff;border:1px solid #EBEFEC;border-radius:16px;padding:22px;\">\n              <div style=\"font-family:'Roboto Mono',monospace;font-size:10.5px;letter-spacing:1px;color:#A8B2AB;margin-bottom:16px;\">BASELINE vs MODIFIED<\u002Fdiv>\n              <sc-if value=\"{{ noResult }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"text-align:center;padding:48px 20px;color:#A8B2AB;\"><svg width=\"34\" height=\"34\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#CBD4CE\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"margin-bottom:12px;\"><path d=\"M21 12 a9 9 0 1 1-3-6.7\"><\u002Fpath><path d=\"M21 4 v5 h-5\"><\u002Fpath><\u002Fsvg><div style=\"font-size:14px;\">Adjust the inputs, then press Recalculate to compare.<\u002Fdiv><\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ hasResult }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;\">\n                  <div style=\"border:1px solid #EBEFEC;border-radius:12px;padding:15px 16px;background:#F7FAF8;\">\n                    <div style=\"font-size:12px;color:#8A968F;margin-bottom:8px;\">Baseline (real)<\u002Fdiv>\n                    <div style=\"font-family:'Roboto Mono',monospace;font-size:24px;font-weight:500;\">{{ sResult.baseTotal }}<\u002Fdiv>\n                    <div style=\"font-size:12px;color:#8A968F;\">kgCO₂e<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"border:1px solid #E7D9BC;border-radius:12px;padding:15px 16px;background:#FFFBF2;\">\n                    <div style=\"font-size:12px;color:#9A6A1E;margin-bottom:8px;\">Modified (hypothetical)<\u002Fdiv>\n                    <div style=\"font-family:'Roboto Mono',monospace;font-size:24px;font-weight:500;color:#8A581E;\">{{ sResult.modTotal }}<\u002Fdiv>\n                    <div style=\"font-size:12px;color:#9A6A1E;\">kgCO₂e<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:12px;background:{{ sResult.deltaBg }};border:1px solid {{ sResult.deltaBorder }};border-radius:12px;padding:14px 18px;margin-bottom:18px;\">\n                  <span style=\"width:36px;height:36px;border-radius:10px;background:{{ sResult.deltaIconBg }};color:#fff;display:flex;align-items:center;justify-content:center;flex:none;\" data-dir=\"{{ sResult.dir }}\">{{ sResult.arrow }}<\u002Fspan>\n                  <div><div style=\"font-family:'Roboto Mono',monospace;font-size:22px;font-weight:500;color:{{ sResult.deltaColor }};\">{{ sResult.deltaText }}<\u002Fdiv><div style=\"font-size:12.5px;color:#5A6B61;\">{{ sResult.deltaSub }}<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display:flex;gap:10px;\">\n                  <div style=\"flex:1;border:1px solid #EBEFEC;border-radius:11px;padding:13px 15px;border-left:3px solid #C2772E;\"><div style=\"font-size:11.5px;color:#B5651F;margin-bottom:4px;\">Scope 1<\u002Fdiv><div style=\"font-family:'Roboto Mono',monospace;font-size:14px;\">{{ sResult.baseS1 }} → <strong>{{ sResult.modS1 }}<\u002Fstrong><\u002Fdiv><\u002Fdiv>\n                  <div style=\"flex:1;border:1px solid #EBEFEC;border-radius:11px;padding:13px 15px;border-left:3px solid #3E6E96;\"><div style=\"font-size:11.5px;color:#34648A;margin-bottom:4px;\">Scope 2<\u002Fdiv><div style=\"font-family:'Roboto Mono',monospace;font-size:14px;\">{{ sResult.baseS2 }} → <strong>{{ sResult.modS2 }}<\u002Fstrong><\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ============ REPORT ============ -->\n        <sc-if value=\"{{ isReport }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:20px;\">\n            <div>\n              <h1 style=\"font-size:28px;font-weight:700;letter-spacing:-.8px;margin:0;\">BRSR Core report<\u002Fh1>\n              <p style=\"font-size:15px;color:#5A6B61;margin:6px 0 0;\">Disclosure preview for the selected reporting period.<\u002Fp>\n            <\u002Fdiv>\n            <button style=\"display:flex;align-items:center;gap:8px;background:#1C2B22;border:none;color:#fff;font-size:14px;font-weight:600;padding:11px 18px;border-radius:11px;\" style-hover=\"background:#26382C;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6 9 V2 h12 v7\"><\u002Fpath><path d=\"M6 18 H4 a2 2 0 0 1-2-2 v-5 a2 2 0 0 1 2-2 h16 a2 2 0 0 1 2 2 v5 a2 2 0 0 1-2 2 h-2\"><\u002Fpath><rect x=\"6\" y=\"14\" width=\"12\" height=\"8\"><\u002Frect><\u002Fsvg>Export PDF<\u002Fbutton>\n          <\u002Fdiv>\n\n          <div style=\"background:#fff;border:1px solid #E2E8E4;border-radius:6px;box-shadow:0 12px 40px rgba(28,43,34,.10);max-width:860px;overflow:hidden;\">\n            <!-- doc header -->\n            <div style=\"border-bottom:2px solid #1C2B22;padding:32px 40px 22px;display:flex;justify-content:space-between;align-items:flex-start;\">\n              <div>\n                <div style=\"font-family:'Roboto Mono',monospace;font-size:10.5px;letter-spacing:1.5px;color:#8A968F;margin-bottom:10px;\">BRSR CORE · GHG EMISSIONS DISCLOSURE<\u002Fdiv>\n                <div style=\"font-size:22px;font-weight:700;letter-spacing:-.4px;\">St. Aloysius Institutions, Mangaluru<\u002Fdiv>\n                <div style=\"font-size:14px;color:#5A6B61;margin-top:4px;\">Reporting period: {{ periodLabel }} · 5 facilities<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"text-align:right;\">\n                <div style=\"width:42px;height:42px;border-radius:11px;background:linear-gradient(150deg,#2E9E6B,#56B98A);display:flex;align-items:center;justify-content:center;color:#fff;margin-left:auto;\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 18 C5 9 12 4 20 4 C20 12 15 19 6 19 Z\"><\u002Fpath><path d=\"M5 19 C8 14 12 11 16 9\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n                <div style=\"font-family:'Roboto Mono',monospace;font-size:9.5px;color:#A8B2AB;margin-top:8px;\">DRAFT · {{ genDate }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- headline disclosures -->\n            <div style=\"padding:26px 40px;border-bottom:1px solid #EBEFEC;\">\n              <div style=\"font-family:'Roboto Mono',monospace;font-size:10px;letter-spacing:1px;color:#A8B2AB;margin-bottom:16px;\">PRINCIPLE 6 · ESSENTIAL INDICATOR 7 — GHG EMISSIONS<\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:0;border:1px solid #EBEFEC;border-radius:8px;overflow:hidden;\">\n                <div style=\"padding:18px 20px;border-right:1px solid #EBEFEC;border-top:3px solid #C2772E;\">\n                  <div style=\"font-size:12.5px;color:#5A6B61;margin-bottom:8px;\">Total Scope 1<\u002Fdiv>\n                  <div style=\"display:flex;align-items:baseline;gap:5px;\"><span style=\"font-family:'Roboto Mono',monospace;font-size:26px;font-weight:500;\">{{ org.s1T }}<\u002Fspan><span style=\"font-size:12px;color:#8A968F;\">tCO₂e<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"padding:18px 20px;border-right:1px solid #EBEFEC;border-top:3px solid #3E6E96;\">\n                  <div style=\"font-size:12.5px;color:#5A6B61;margin-bottom:8px;\">Total Scope 2<\u002Fdiv>\n                  <div style=\"display:flex;align-items:baseline;gap:5px;\"><span style=\"font-family:'Roboto Mono',monospace;font-size:26px;font-weight:500;\">{{ org.s2T }}<\u002Fspan><span style=\"font-size:12px;color:#8A968F;\">tCO₂e<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"padding:18px 20px;border-top:3px solid #1C2B22;\">\n                  <div style=\"font-size:12.5px;color:#5A6B61;margin-bottom:8px;\">Energy intensity<\u002Fdiv>\n                  <div style=\"display:flex;align-items:baseline;gap:5px;\"><span style=\"font-family:'Roboto Mono',monospace;font-size:26px;font-weight:500;\">{{ report.intensity }}<\u002Fspan><span style=\"font-size:12px;color:#8A968F;\">tCO₂e / 1k ft²<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:30px;margin-top:16px;\">\n                <div style=\"font-size:13px;color:#5A6B61;\">Total CO₂e <strong style=\"font-family:'Roboto Mono',monospace;color:#1C2B22;\">{{ org.totalT }} t<\u002Fstrong><\u002Fdiv>\n                <div style=\"font-size:13px;color:#5A6B61;\">Total energy <strong style=\"font-family:'Roboto Mono',monospace;color:#1C2B22;\">{{ report.energyGJ }} GJ<\u002Fstrong><\u002Fdiv>\n                <div style=\"font-size:13px;color:#5A6B61;\">Built-up area <strong style=\"font-family:'Roboto Mono',monospace;color:#1C2B22;\">112,000 ft²<\u002Fstrong><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- by facility -->\n            <div style=\"padding:26px 40px;border-bottom:1px solid #EBEFEC;\">\n              <div style=\"font-family:'Roboto Mono',monospace;font-size:10px;letter-spacing:1px;color:#A8B2AB;margin-bottom:14px;\">DISAGGREGATION BY FACILITY<\u002Fdiv>\n              <div style=\"border:1px solid #EBEFEC;border-radius:8px;overflow:hidden;\">\n                <div style=\"display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;background:#F4F7F5;padding:10px 16px;font-family:'Roboto Mono',monospace;font-size:10px;letter-spacing:.5px;color:#8A968F;\">\n                  <span>FACILITY<\u002Fspan><span style=\"text-align:right;\">SCOPE 1<\u002Fspan><span style=\"text-align:right;\">SCOPE 2<\u002Fspan><span style=\"text-align:right;\">TOTAL<\u002Fspan><span style=\"text-align:right;\">tCO₂e/1k ft²<\u002Fspan>\n                <\u002Fdiv>\n                <sc-for list=\"{{ report.rows }}\" as=\"r\" hint-placeholder-count=\"5\">\n                  <div style=\"display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;padding:11px 16px;border-top:1px solid #F0F3F1;font-size:13.5px;align-items:center;\">\n                    <span style=\"font-weight:500;\">{{ r.name }} <span style=\"font-size:11px;color:#A8B2AB;font-weight:400;\">{{ r.inst }}<\u002Fspan><\u002Fspan>\n                    <span style=\"text-align:right;font-family:'Roboto Mono',monospace;color:#B5651F;\">{{ r.s1 }}<\u002Fspan>\n                    <span style=\"text-align:right;font-family:'Roboto Mono',monospace;color:#34648A;\">{{ r.s2 }}<\u002Fspan>\n                    <span style=\"text-align:right;font-family:'Roboto Mono',monospace;font-weight:500;\">{{ r.total }}<\u002Fspan>\n                    <span style=\"text-align:right;font-family:'Roboto Mono',monospace;color:#5A6B61;\">{{ r.intensity }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n                <div style=\"display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;padding:12px 16px;border-top:2px solid #E2E8E4;background:#FAFCFB;font-size:13.5px;font-weight:700;align-items:center;\">\n                  <span>All facilities<\u002Fspan>\n                  <span style=\"text-align:right;font-family:'Roboto Mono',monospace;color:#B5651F;\">{{ org.s1T }}<\u002Fspan>\n                  <span style=\"text-align:right;font-family:'Roboto Mono',monospace;color:#34648A;\">{{ org.s2T }}<\u002Fspan>\n                  <span style=\"text-align:right;font-family:'Roboto Mono',monospace;\">{{ org.totalT }}<\u002Fspan>\n                  <span style=\"text-align:right;font-family:'Roboto Mono',monospace;color:#5A6B61;\">{{ report.intensity }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-size:11.5px;color:#A8B2AB;margin-top:10px;line-height:1.5;\">Scope 2 computed at grid emission factor 0.71 kgCO₂e/kWh (CEA). Scope 1 from diesel 2.68, petrol 2.31, LPG 2.98 kgCO₂e/unit. Figures are activity-based and human-verified.<\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- signature -->\n            <div style=\"padding:24px 40px;display:flex;justify-content:space-between;align-items:flex-end;\">\n              <div style=\"font-size:12.5px;color:#8A968F;line-height:1.6;\">Prepared by Sustainability Office<br>Aligned to SEBI BRSR Core &amp; GHG Protocol<\u002Fdiv>\n              <div style=\"text-align:right;\"><div style=\"width:160px;border-bottom:1px solid #C7CFC9;margin-bottom:6px;height:34px;\"><\u002Fdiv><div style=\"font-size:11.5px;color:#8A968F;\">Authorised signatory<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1420,&quot;height&quot;:920}}\">\nclass Component extends DCLogic {\n  state = {\n    page: 'login',\n    period: 5,\n    trendFac: 'all',\n    entryFac: 'fac1', entryPeriod: 5, entryType: 'electricity', entryMode: 'manual',\n    entryQty: '', entrySaved: false,\n    csvDone: false,\n    ocrStage: 'upload', ocrValue: '1860',\n    sFac: 'fac3', sPeriod: 5,\n    sInputs: { electricity: 6900, diesel: 1480, petrol: 175 },\n    sResult: null,\n  };\n\n  EF = { electricity: 0.71, diesel: 2.68, petrol: 2.31, lpg: 2.98 };\n  GJ = { electricity: 0.0036, diesel: 0.0386, petrol: 0.0342, lpg: 0.0473 };\n  scope = { electricity: 's2', diesel: 's1', petrol: 's1', lpg: 's1' };\n  unit = { electricity: 'kWh', diesel: 'L', petrol: 'L', lpg: 'kg' };\n  typeLabel = { electricity: 'Electricity', diesel: 'Diesel', petrol: 'Petrol', lpg: 'LPG' };\n  periods = ['Dec 2025', 'Jan 2026', 'Feb 2026', 'Mar 2026', 'Apr 2026', 'May 2026'];\n  shortP = ['Dec', 'Jan', 'Feb', 'Mar', 'Apr', 'May'];\n  facMeta = [\n    { id: 'fac1', name: 'Academic Block A', inst: 'College', area: 48000 },\n    { id: 'fac2', name: \"Boys' Hostel & Mess\", inst: 'College', area: 36000 },\n    { id: 'fac3', name: 'Workshop & DG Set', inst: 'College', area: 12000 },\n    { id: 'fac4', name: \"St. Mary's Sanctuary\", inst: 'Church', area: 9000 },\n    { id: 'fac5', name: 'Parish Hall & Kitchen', inst: 'Church', area: 7000 },\n  ];\n  raw = {\n    fac1: { electricity: [18500, 19200, 20100, 21500, 22800, 24100] },\n    fac2: { electricity: [12800, 13100, 13400, 13900, 14200, 14600], lpg: [920, 940, 910, 930, 950, 970] },\n    fac3: { electricity: [6200, 6400, 6300, 6600, 6800, 6900], diesel: [640, 680, 700, 720, 760, 1480], petrol: [140, 150, 145, 160, 170, 175] },\n    fac4: { electricity: [3200, 3400, 3600, 3900, 4000, 4200] },\n    fac5: { electricity: [null, null, 3100, 3300, 3450, 3600], lpg: [null, null, 265, 290, 310, 540] },\n  };\n\n  fmt(n) { return Math.round(n).toLocaleString('en-IN'); }\n  ft(kg) { return (kg / 1000).toFixed(2); }\n  facName(id) { const f = this.facMeta.find(x => x.id === id); return f ? f.name : ''; }\n\n  emiss(facId, idx) {\n    const r = this.raw[facId]; let s1 = 0, s2 = 0, has = false;\n    for (const tp in r) { const q = r[tp][idx]; if (q == null) continue; has = true; const e = q * this.EF[tp]; if (this.scope[tp] === 's1') s1 += e; else s2 += e; }\n    return { s1, s2, total: s1 + s2, has };\n  }\n  orgEmiss(idx) { let s1 = 0, s2 = 0; this.facMeta.forEach(f => { const e = this.emiss(f.id, idx); s1 += e.s1; s2 += e.s2; }); return { s1, s2, total: s1 + s2 }; }\n\n  // --- anomalies (current period vs prior baseline) ---\n  buildAnomalies() {\n    const idx = 5; const out = [];\n    this.facMeta.forEach(f => {\n      const r = this.raw[f.id];\n      for (const tp in r) {\n        const cur = r[tp][idx]; if (cur == null) continue;\n        const prior = r[tp].slice(0, idx).filter(v => v != null);\n        if (prior.length < 2) continue;\n        const avg = prior.reduce((a, b) => a + b, 0) / prior.length;\n        const pct = Math.round((cur - avg) / avg * 100);\n        if (pct < 50) continue;\n        const months = prior.length;\n        let conf = 'HIGH', confColor = '#2E7D57', confBg = '#E8F3EC', confBorder = '#BFE0CC', confDot = '#2E9E6B';\n        if (months <= 3) { conf = 'MODERATE'; confColor = '#9A6A1E'; confBg = '#FCF4E6'; confBorder = '#EED9B4'; confDot = '#C2902E'; }\n        if (months < 2) { conf = 'LOW'; }\n        out.push({\n          facId: f.id, facName: f.name, type: tp, typeLabel: this.typeLabel[tp],\n          scopeLabel: this.scope[tp] === 's1' ? 'SCOPE 1' : 'SCOPE 2',\n          scopeColor: this.scope[tp] === 's1' ? '#B5651F' : '#34648A',\n          scopeBg: this.scope[tp] === 's1' ? '#FBEFE2' : '#ECF1F6',\n          period: this.periods[idx], cur: this.fmt(cur), avg: this.fmt(avg), unit: this.unit[tp],\n          pct, months, confLabel: conf, confColor, confBg, confBorder, confDot,\n        });\n      }\n    });\n    return out.sort((a, b) => b.pct - a.pct);\n  }\n\n  buildRecs() {\n    const idx = 5; const org = this.orgEmiss(idx);\n    const s2share = Math.round(org.s2 / org.total * 100);\n    const recs = [];\n    if (s2share > 60) recs.push({\n      facId: 'all', title: 'Procure renewable electricity', tag: 'SCOPE 2', tagColor: '#34648A', tagBg: '#ECF1F6',\n      trigger: 'Scope 2 is ' + s2share + '% of total — threshold 60%',\n      body: 'Purchased electricity dominates the footprint. A rooftop solar array on Academic Block A or a green-power tariff with MESCOM would cut Scope 2 directly.',\n    });\n    // diesel spike fac3\n    const f3 = this.raw.fac3.diesel; const f3avg = f3.slice(0, 5).reduce((a, b) => a + b, 0) / 5;\n    const f3pct = Math.round((f3[5] - f3avg) / f3avg * 100);\n    recs.push({\n      facId: 'fac3', title: 'Investigate Workshop diesel use', tag: 'SCOPE 1', tagColor: '#B5651F', tagBg: '#FBEFE2',\n      trigger: 'Diesel up ' + f3pct + '% vs 5-mo avg (' + this.fmt(f3avg) + ' L → ' + this.fmt(f3[5]) + ' L)',\n      body: 'The DG set ran far above its norm last month. Check for a grid-outage backlog or metering error, and shift base load back to the grid where supply is stable.',\n    });\n    // electricity growth fac1\n    const f1 = this.raw.fac1.electricity; const g = Math.round((f1[5] - f1[0]) / f1[0] * 100);\n    recs.push({\n      facId: 'fac1', title: 'Tighten Academic Block cooling schedule', tag: 'SCOPE 2', tagColor: '#34648A', tagBg: '#ECF1F6',\n      trigger: 'Electricity up ' + g + '% over 6 mo (' + this.fmt(f1[0]) + ' → ' + this.fmt(f1[5]) + ' kWh)',\n      body: 'Consumption has climbed every month into summer. AC setpoint limits (24°C) and a BMS night setback would flatten the curve without affecting classes.',\n    });\n    // fac5 lpg\n    const f5 = this.raw.fac5.lpg; const f5p = f5.slice(0, 5).filter(v => v != null); const f5avg = f5p.reduce((a, b) => a + b, 0) / f5p.length;\n    const f5pct = Math.round((f5[5] - f5avg) / f5avg * 100);\n    recs.push({\n      facId: 'fac5', title: 'Verify Parish kitchen LPG log', tag: 'SCOPE 1', tagColor: '#B5651F', tagBg: '#FBEFE2',\n      trigger: 'LPG up ' + f5pct + '% vs ' + f5p.length + '-mo avg (' + this.fmt(f5avg) + ' → ' + this.fmt(f5[5]) + ' kg)',\n      body: 'A sharp jump on only ' + f5p.length + ' months of history — likely a large catered event or a double-counted cylinder. Confirm the entry before it skews the trend.',\n    });\n    return recs;\n  }\n\n  buildChart(facId) {\n    const s1 = [], s2 = [];\n    for (let i = 0; i < 6; i++) {\n      if (facId === 'all') { const e = this.orgEmiss(i); s1.push(e.s1 / 1000); s2.push(e.s2 / 1000); }\n      else { const e = this.emiss(facId, i); s1.push(e.has ? e.s1 / 1000 : null); s2.push(e.has ? e.s2 / 1000 : null); }\n    }\n    const padL = 40, padR = 12, padT = 16, padB = 34, W = 360, H = 240;\n    const plotW = W - padL - padR, plotH = H - padT - padB;\n    const x = i => padL + i * (plotW / 5);\n    // build one sub-chart (own scale) for a single series\n    const sub = (arr) => {\n      const vals = arr.filter(v => v != null);\n      const max = Math.max(...vals, 1) * 1.2;\n      const y = v => padT + plotH * (1 - v / max);\n      const pts = arr.map((v, i) => v == null ? null : { x: x(i), y: y(v) }).filter(p => p != null);\n      const line = pts.map(p => p.x + ',' + p.y).join(' ');\n      const base = padT + plotH;\n      const area = pts.length ? (pts[0].x + ',' + base + ' ' + line + ' ' + pts[pts.length - 1].x + ',' + base) : '';\n      const gridY = [0, 0.5, 1].map(f => { const v = max * f; return { y: y(v), ty: y(v) + 3, label: v.toFixed(1) }; });\n      return { line, area, dots: pts, gridY };\n    };\n    const xLabels = this.shortP.map((l, i) => ({ x: x(i), label: l }));\n    return { s1: sub(s1), s2: sub(s2), xLabels };\n  }\n\n  trendSummaryText(facId) {\n    const series = (sc) => { const a = []; for (let i = 0; i < 6; i++) { const e = facId === 'all' ? this.orgEmiss(i) : this.emiss(facId, i); a.push(e.has === false ? null : e[sc]); } return a; };\n    const note = (arr) => {\n      const f = arr.find(v => v != null), l = [...arr].reverse().find(v => v != null);\n      if (f == null || l == null) return 'No data in range.';\n      const pct = Math.round((l - f) / f * 100);\n      const dir = pct > 0 ? 'up' : pct < 0 ? 'down' : 'flat';\n      return this.ft(l) + ' tCO₂e this month, ' + (dir === 'flat' ? 'unchanged' : Math.abs(pct) + '% ' + dir) + ' versus the start of the window.';\n    };\n    return { s1: note(series('s1')), s2: note(series('s2')) };\n  }\n\n  seedInputs(facId, idx) { const r = this.raw[facId]; const o = {}; for (const tp in r) { o[tp] = r[tp][idx] == null ? 0 : r[tp][idx]; } return o; }\n  emFromInputs(o) { let s1 = 0, s2 = 0; for (const tp in o) { const e = (+o[tp] || 0) * this.EF[tp]; if (this.scope[tp] === 's1') s1 += e; else s2 += e; } return { s1, s2, total: s1 + s2 }; }\n\n  navStyle(key) {\n    const active = this.state.page === key;\n    return {\n      go: () => this.setState({ page: key }),\n      bg: active ? '#EEF6F1' : 'transparent',\n      color: active ? '#1C2B22' : '#52635A',\n      weight: active ? 600 : 500,\n      bar: active ? '#2E9E6B' : 'transparent',\n      iconBg: active ? '#2E9E6B' : '#F4F7F5',\n      iconColor: active ? '#fff' : '#8A968F',\n    };\n  }\n\n  renderVals() {\n    const s = this.state;\n    const idx = +s.period;\n    const anomalies = this.buildAnomalies();\n    const recs = this.buildRecs();\n    const anomalyFacs = anomalies.map(a => a.facId);\n    const recFacs = recs.map(r => r.facId);\n\n    // dashboard\n    const org0 = this.orgEmiss(idx);\n    const org = {\n      totalT: this.ft(org0.total), s1T: this.ft(org0.s1), s2T: this.ft(org0.s2),\n      s1pct: Math.round(org0.s1 / org0.total * 100), s2pct: Math.round(org0.s2 / org0.total * 100),\n      s1w: (org0.s1 / org0.total * 100) + '%', s2w: (org0.s2 / org0.total * 100) + '%',\n    };\n    const facilityCards = this.facMeta.map(f => {\n      const e = this.emiss(f.id, idx);\n      const types = Object.keys(this.raw[f.id]).map(t => this.typeLabel[t]).join(' · ');\n      return {\n        id: f.id, name: f.name, instLabel: f.inst.toUpperCase(), instLabel2: f.inst,\n        instColor: f.inst === 'College' ? '#34648A' : '#7A5AA8',\n        instBg: f.inst === 'College' ? '#ECF1F6' : '#F1ECF8',\n        instBorder: f.inst === 'College' ? '#CDDCEA' : '#DDD0EF',\n        typesLabel: types,\n        totalT: this.ft(e.total), s1T: this.ft(e.s1), s2T: this.ft(e.s2),\n        s1w: (e.total ? e.s1 / e.total * 100 : 0) + '%', s2w: (e.total ? e.s2 / e.total * 100 : 0) + '%',\n        hasAnomaly: anomalyFacs.includes(f.id),\n        hasRec: recFacs.includes(f.id),\n      };\n    });\n\n    // activity entry\n    const aType = s.entryType;\n    const qty = +s.entryQty || 0;\n    const calc = qty * this.EF[aType];\n    const scopeIsS1 = this.scope[aType] === 's1';\n    const activityTypes = ['electricity', 'diesel', 'petrol', 'lpg'].map(tp => {\n      const sel = s.entryType === tp; const isS1 = this.scope[tp] === 's1';\n      const glyphs = { electricity: '⚡', diesel: '🛢', petrol: '⛽', lpg: '🔥' };\n      return {\n        id: tp, label: this.typeLabel[tp], glyph: glyphs[tp],\n        factor: this.EF[tp] + ' kg/' + this.unit[tp],\n        scopeLabel: isS1 ? 'SCOPE 1' : 'SCOPE 2',\n        scopeColor: isS1 ? '#B5651F' : '#34648A', scopeBg: isS1 ? '#FBEFE2' : '#ECF1F6',\n        border: sel ? (isS1 ? '#C2772E' : '#3E6E96') : '#E6ECE8',\n        bg: sel ? (isS1 ? '#FCF6EF' : '#F1F5F9') : '#fff',\n        titleColor: sel ? '#1C2B22' : '#3A4A41',\n        iconBg: isS1 ? '#FBEFE2' : '#ECF1F6', iconColor: isS1 ? '#B5651F' : '#34648A',\n        select: () => this.setState({ entryType: tp, entrySaved: false }),\n      };\n    });\n    const csvRows = [\n      { date: '2026-05-31', type: 'Electricity', qty: '1,860 kWh', scope: 'S2', scopeColor: '#34648A', scopeBg: '#ECF1F6' },\n      { date: '2026-05-31', type: 'Diesel', qty: '210 L', scope: 'S1', scopeColor: '#B5651F', scopeBg: '#FBEFE2' },\n      { date: '2026-05-28', type: 'LPG', qty: '45 kg', scope: 'S1', scopeColor: '#B5651F', scopeBg: '#FBEFE2' },\n      { date: '2026-05-15', type: 'Electricity', qty: '940 kWh', scope: 'S2', scopeColor: '#34648A', scopeBg: '#ECF1F6' },\n    ];\n    const tab = (m) => ({\n      bg: s.entryMode === m ? '#fff' : 'transparent',\n      color: s.entryMode === m ? '#1C2B22' : '#5A6B61',\n      shadow: s.entryMode === m ? '0 2px 6px rgba(28,43,34,.1)' : 'none',\n    });\n    const tM = tab('manual'), tC = tab('csv'), tO = tab('ocr');\n    const ocrCalc = this.fmt((+s.ocrValue || 0) * this.EF.electricity);\n\n    // trends\n    const chart = this.buildChart(s.trendFac);\n    const trendSummary = this.trendSummaryText(s.trendFac);\n\n    // scenario\n    const baseInputs = this.seedInputs(s.sFac, +s.sPeriod);\n    const baseE = this.emFromInputs(baseInputs);\n    const sInputRows = Object.keys(baseInputs).map(tp => ({\n      type: tp, label: this.typeLabel[tp], unit: this.unit[tp],\n      scopeColor: this.scope[tp] === 's1' ? '#C2772E' : '#3E6E96',\n      baseline: this.fmt(baseInputs[tp]),\n      value: s.sInputs[tp] == null ? '' : s.sInputs[tp],\n      onChange: (e) => { const v = e.target.value; this.setState(st => ({ sInputs: { ...st.sInputs, [tp]: v }, sResult: null })); },\n    }));\n    let sResult = null;\n    if (s.sResult) {\n      const mod = s.sResult;\n      const delta = mod.total - baseE.total;\n      const pct = baseE.total ? Math.round(delta / baseE.total * 100) : 0;\n      const down = delta < 0;\n      sResult = {\n        baseTotal: this.fmt(baseE.total), modTotal: this.fmt(mod.total),\n        baseS1: this.fmt(baseE.s1), modS1: this.fmt(mod.s1), baseS2: this.fmt(baseE.s2), modS2: this.fmt(mod.s2),\n        dir: down ? 'down' : 'up', arrow: down ? '↓' : '↑',\n        deltaText: (down ? '−' : '+') + this.fmt(Math.abs(delta)) + ' kg',\n        deltaSub: Math.abs(pct) + '% ' + (down ? 'lower than' : 'higher than') + ' the real period',\n        deltaColor: down ? '#2E7D57' : '#B5651F',\n        deltaBg: down ? '#E8F3EC' : '#FBEFE2', deltaBorder: down ? '#BFE0CC' : '#F0D3B4',\n        deltaIconBg: down ? '#2E9E6B' : '#C2772E',\n      };\n    }\n\n    // report\n    const rrows = this.facMeta.map(f => {\n      const e = this.emiss(f.id, idx);\n      return { name: f.name, inst: '· ' + f.inst, s1: this.ft(e.s1), s2: this.ft(e.s2), total: this.ft(e.total), intensity: (e.total / f.area * 1000 / 1000).toFixed(3) };\n    });\n    let energyKg = 0;\n    this.facMeta.forEach(f => { const r = this.raw[f.id]; for (const tp in r) { const q = r[tp][idx]; if (q != null) energyKg += q * this.GJ[tp]; } });\n    const totalArea = this.facMeta.reduce((a, f) => a + f.area, 0);\n    const report = {\n      rows: rrows, energyGJ: energyKg.toFixed(1),\n      intensity: (org0.total / totalArea * 1000 / 1000).toFixed(3),\n    };\n\n    return {\n      isLogin: s.page === 'login',\n      isApp: s.page !== 'login',\n      isDashboard: s.page === 'dashboard', isEntry: s.page === 'entry', isTrends: s.page === 'trends',\n      isAnomalies: s.page === 'anomalies', isRecs: s.page === 'recs', isScenario: s.page === 'scenario', isReport: s.page === 'report',\n      mainBg: s.page === 'scenario' ? '#FBF8F0' : '#F4F7F5',\n      signIn: () => this.setState({ page: 'dashboard' }),\n      signOut: () => this.setState({ page: 'login' }),\n      nav: { dashboard: this.navStyle('dashboard'), entry: this.navStyle('entry'), trends: this.navStyle('trends'), anomalies: this.navStyle('anomalies'), recs: this.navStyle('recs'), scenario: this.navStyle('scenario'), report: this.navStyle('report') },\n      periodLabel: this.periods[idx],\n      period: s.period,\n      periodOptions: this.periods.map((p, i) => ({ idx: i, label: p })),\n      setPeriod: (e) => this.setState({ period: +e.target.value }),\n      anomalyCount: anomalies.length, recCount: recs.length,\n      org, facilityCards,\n\n      // entry\n      entryFac: s.entryFac, entryPeriod: s.entryPeriod, entryQty: s.entryQty, entrySaved: s.entrySaved,\n      facilityOptions: this.facMeta.map(f => ({ id: f.id, name: f.name })),\n      setEntryFac: (e) => this.setState({ entryFac: e.target.value, entrySaved: false }),\n      setEntryPeriod: (e) => this.setState({ entryPeriod: +e.target.value, entrySaved: false }),\n      activityTypes,\n      isManual: s.entryMode === 'manual', isCsv: s.entryMode === 'csv', isOcr: s.entryMode === 'ocr',\n      setModeManual: () => this.setState({ entryMode: 'manual' }), setModeCsv: () => this.setState({ entryMode: 'csv' }), setModeOcr: () => this.setState({ entryMode: 'ocr' }),\n      tabManualBg: tM.bg, tabManualColor: tM.color, tabManualShadow: tM.shadow,\n      tabCsvBg: tC.bg, tabCsvColor: tC.color, tabCsvShadow: tC.shadow,\n      tabOcrBg: tO.bg, tabOcrColor: tO.color, tabOcrShadow: tO.shadow,\n      entryUnit: this.unit[aType], entryFactor: this.EF[aType] + ' kg/' + this.unit[aType],\n      entryQtyDisplay: this.fmt(qty), entryCalc: this.fmt(calc),\n      entryScopeColor: scopeIsS1 ? '#B5651F' : '#34648A', entryScopeBg: scopeIsS1 ? '#FBEFE2' : '#ECF1F6',\n      entryScopeLabel: scopeIsS1 ? 'SCOPE 1' : 'SCOPE 2',\n      entryFacName: this.facName(s.entryFac), entryPeriodLabel: this.periods[+s.entryPeriod],\n      setEntryQty: (e) => this.setState({ entryQty: e.target.value, entrySaved: false }),\n      saveManual: () => this.setState({ entrySaved: true }),\n      csvNotDone: !s.csvDone, csvDone: s.csvDone, csvRows,\n      uploadCsv: () => this.setState({ csvDone: true, entrySaved: false }),\n      resetCsv: () => this.setState({ csvDone: false, entrySaved: false }),\n      ocrUploadStage: s.ocrStage === 'upload', ocrExtractStage: s.ocrStage === 'extracted', ocrConfirmStage: s.ocrStage === 'confirmed',\n      ocrValue: s.ocrValue, ocrCalc,\n      scanBill: () => this.setState({ ocrStage: 'extracted' }),\n      setOcrValue: (e) => this.setState({ ocrValue: e.target.value }),\n      confirmOcr: () => this.setState({ ocrStage: 'confirmed' }),\n      resetOcr: () => this.setState({ ocrStage: 'upload', ocrValue: '1860' }),\n\n      // trends\n      trendFac: s.trendFac, setTrendFac: (e) => this.setState({ trendFac: e.target.value }),\n      chart, trendSummary,\n\n      // anomalies / recs\n      anomalies, recs,\n\n      // scenario\n      sFac: s.sFac, sPeriod: s.sPeriod, sFacName: this.facName(s.sFac), sPeriodLabel: this.periods[+s.sPeriod],\n      sPeriodOptions: this.periods.map((p, i) => ({ idx: i, label: p })),\n      setSFac: (e) => { const fac = e.target.value; this.setState({ sFac: fac, sInputs: this.seedInputs(fac, +this.state.sPeriod), sResult: null }); },\n      setSPeriod: (e) => { const p = +e.target.value; this.setState({ sPeriod: p, sInputs: this.seedInputs(this.state.sFac, p), sResult: null }); },\n      sInputRows,\n      recalc: () => this.setState(st => ({ sResult: this.emFromInputs(st.sInputs) })),\n      noResult: !s.sResult, hasResult: !!s.sResult, sResult,\n\n      // report\n      genDate: '24 Jun 2026', report,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
