# CarbonTrace — full stack orchestration
# One command (`docker compose up`) brings up the entire system.
#
# NOTE: values come from the .env file in this same folder (see .env.example).
# Docker Compose auto-loads .env for ${VAR} substitution below.

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — relational store for users, roles, facilities, sessions, uploads.
  # This is the "system of record" for anything transactional/relational.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: carbontrace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - carbontrace

  # ---------------------------------------------------------------------------
  # Backend — FastAPI app (auth, emissions API, anomaly engine, PDF reports).
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: carbontrace-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    ports:
      - "8000:8000"   # lets the Vite dev server (localhost:5173) proxy /api -> backend
    networks:
      - carbontrace

  # ---------------------------------------------------------------------------
  # Frontend — React + Vite dashboard. In production it is built to static
  # files and served by nginx; this service is primarily for local dev.
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: carbontrace-frontend
    restart: unless-stopped
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-/api}
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - carbontrace

  # ---------------------------------------------------------------------------
  # Nginx — reverse proxy / single entry point. Routes /api -> backend and
  # everything else -> frontend, so the browser only ever talks to one origin
  # (which keeps cookies + CORS simple).
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: carbontrace-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - backend
      - frontend
    networks:
      - carbontrace

volumes:
  postgres_data:

networks:
  carbontrace:
    driver: bridge
