# CarbonTrace — full stack orchestration
# One command (`docker compose up`) brings up the entire system.
# Services are grouped: data stores -> ELK pipeline -> app -> reverse proxy.
#
# NOTE: values come from the .env file in this same folder (see .env.example).
# Docker Compose auto-loads .env for ${VAR} substitution below.

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — relational store for users, roles, facilities, sessions, uploads.
  # This is the "system of record" for anything transactional/relational.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: carbontrace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - carbontrace

  # ---------------------------------------------------------------------------
  # Elasticsearch — time-series store for emission readings + anomalies.
  # Heap capped at 512MB to fit a single e2-medium (see ES_JAVA_OPTS in .env).
  # Security disabled for the demo so Logstash/Kibana connect without TLS certs.
  # ---------------------------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: carbontrace-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=${ES_JAVA_OPTS:--Xms512m -Xmx512m}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"\\(green\\|yellow\\)\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - carbontrace

  # ---------------------------------------------------------------------------
  # Logstash — ingestion pipeline. Receives data (HTTP/TCP) and writes it to
  # Elasticsearch. Decouples "how data arrives" from "where data is stored".
  # ---------------------------------------------------------------------------
  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    container_name: carbontrace-logstash
    restart: unless-stopped
    volumes:
      - ./elk/logstash/pipeline:/usr/share/logstash/pipeline:ro
    ports:
      - "${LOGSTASH_HTTP_PORT:-8080}:8080"   # HTTP input for the poller/generator
    environment:
      - LS_JAVA_OPTS=${LS_JAVA_OPTS:--Xms256m -Xmx256m}
      - ELASTICSEARCH_HOST=elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - carbontrace

  # ---------------------------------------------------------------------------
  # Kibana — Elasticsearch's visual console. Used for debugging indices and
  # building quick admin dashboards (our React app is the user-facing UI).
  # ---------------------------------------------------------------------------
  # Off by default (saves ~1GB RAM + its image). Run with: docker compose --profile tools up
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: carbontrace-kibana
    restart: unless-stopped
    profiles: ["tools"]
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - carbontrace

  # ---------------------------------------------------------------------------
  # Backend — FastAPI app (auth, emissions API, anomaly engine, PDF reports)
  # plus the APScheduler worker that polls external APIs every 5 minutes.
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: carbontrace-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - LOGSTASH_URL=http://logstash:8080
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    expose:
      - "8000"
    ports:
      - "8000:8000"   # lets the Vite dev server (localhost:5173) proxy /api -> backend
    networks:
      - carbontrace

  # ---------------------------------------------------------------------------
  # Poller — standalone APScheduler process (reuses the backend image). Polls
  # the external APIs + sensor generator every POLL_INTERVAL_MINUTES and ships
  # readings to Logstash. Runs as ONE process to avoid duplicate ingestion.
  # ---------------------------------------------------------------------------
  poller:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: carbontrace-poller
    restart: unless-stopped
    command: ["python", "-m", "worker.run"]
    env_file:
      - .env
    environment:
      - LOGSTASH_URL=http://logstash:8080
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    depends_on:
      - logstash
    networks:
      - carbontrace

  # ---------------------------------------------------------------------------
  # Frontend — React + Vite dashboard. In production it is built to static
  # files and served by nginx; this service is primarily for local dev.
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: carbontrace-frontend
    restart: unless-stopped
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-/api}
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - carbontrace

  # ---------------------------------------------------------------------------
  # Nginx — reverse proxy / single entry point. Routes /api -> backend and
  # everything else -> frontend, so the browser only ever talks to one origin
  # (which keeps cookies + CORS simple).
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: carbontrace-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - backend
      - frontend
    networks:
      - carbontrace

volumes:
  postgres_data:
  es_data:

networks:
  carbontrace:
    driver: bridge
