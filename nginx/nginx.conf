# CarbonTrace reverse proxy.
# Single public entry point: routes /api -> FastAPI backend, everything else
# -> the React frontend. Keeping one origin means cookies (refresh token) and
# CORS "just work" for the browser.

events {
    worker_connections 1024;
}

http {
    sendfile on;
    keepalive_timeout 65;

    # Upstreams refer to the docker-compose service names.
    upstream backend {
        server backend:8000;
    }
    upstream frontend {
        server frontend:80;
    }

    server {
        listen 80;
        server_name _;

        # API traffic -> FastAPI. The /api prefix is preserved because the
        # backend mounts its routers under /api/... too.
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Everything else -> the React app (which serves index.html + assets).
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
