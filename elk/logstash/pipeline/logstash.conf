input {
  http {
    port => 8080
    codec => json_lines
  }
}

filter {
  # Parsing / normalisation / tagging added in the Logstash phase.
}

output {
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOST:elasticsearch:9200}"]
    index => "emissions-live"
  }
